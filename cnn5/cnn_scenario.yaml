management:                 # Management application properties
  - task: mapper_task       # Required: the first management task should be mapper_task
    static_mapping: [0,0]   # Required: map mapper_task to 0x0
apps:                       # Application properties
  - name: cnn5
    static_mapping:         # Static mapping minimizing NoC hops between communicating tasks
      # ── Conv1 workers ──────────────────────────────────────────────────────
      # p1_0 shares PE [0,0] with mapper_task (tasks_per_PE: 2)
      p1_0: [0,0]
      p1_1: [1,0]
      p1_2: [0,1]
      # ── Conv1 accumulator ──────────────────────────────────────────────────
      # Central to p1 workers; reused later by p10 (layer gap = 8)
      p2:   [1,1]
      # ── Conv2 workers ──────────────────────────────────────────────────────
      p3_0: [2,0]
      p3_1: [2,1]
      p3_2: [1,2]
      p3_3: [0,2]
      # ── Conv2 accumulator ──────────────────────────────────────────────────
      # Central to p3 workers; reused later by p7_5 (layer gap = 3)
      p4:   [2,2]
      # ── Conv3 workers ──────────────────────────────────────────────────────
      # Cluster toward [3,3] where p6 sits; each PE reused for a p7 worker
      p5_0: [3,0]
      p5_1: [3,1]
      p5_2: [3,2]
      p5_3: [2,3]
      p5_4: [1,3]
      p5_5: [0,3]
      # ── Conv3 accumulator ──────────────────────────────────────────────────
      # Pre-assigned to [3,3]; reused by p8 (layer gap = 2)
      p6:   [3,3]
      # ── Conv4 workers ──────────────────────────────────────────────────────
      # Reuse Conv3-worker PEs (layer gap = 2), clustered around p6/p8 at [3,3]
      p7_0: [3,2]   # shares with p5_2 — 1 hop from [3,3]
      p7_1: [2,3]   # shares with p5_3 — 1 hop from [3,3]
      p7_2: [3,1]   # shares with p5_1 — 2 hops from [3,3]
      p7_3: [1,3]   # shares with p5_4 — 2 hops from [3,3]
      p7_4: [3,0]   # shares with p5_0 — 3 hops from [3,3]
      p7_5: [2,2]   # shares with p4   — 2 hops from [3,3]
      # ── Conv4 accumulator ──────────────────────────────────────────────────
      # Shares [3,3] with p6 (layer gap = 2); central to all p7 workers
      p8:   [3,3]
      # ── Conv5 workers ──────────────────────────────────────────────────────
      # Reuse Conv2-worker PEs (layer gap = 6) and one Conv3-worker PE (gap = 4)
      # Placed as close as possible to p8 at [3,3] given available free slots
      p9_0: [0,3]   # shares with p5_5 — 3 hops from [3,3]
      p9_1: [2,1]   # shares with p3_1 — 3 hops from [3,3]
      p9_2: [1,2]   # shares with p3_2 — 3 hops from [3,3]
      p9_3: [2,0]   # shares with p3_0 — 4 hops from [3,3]
      # ── Conv5 accumulator ──────────────────────────────────────────────────
      # Shares [1,1] with p2 (layer gap = 8); central to all p9 workers
      p10:  [1,1]
